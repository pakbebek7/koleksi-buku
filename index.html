<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katalog Koleksi Buku (Mandiri)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700;9..144,900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:#faf6ee;
    --bg-2:#f2ecdd;
    --surface:#ffffff;
    --ink:#1f2937;
    --ink-soft:#6b6255;
    --emerald:#0f4c3a;
    --emerald-light:#1a6b52;
    --emerald-glow:#e4f0ea;
    --gold:#c9973f;
    --gold-light:#e8c789;
    --terracotta:#c1544b;
    --terracotta-light:#f4ded9;
    --sky:#3b6e8f;
    --sky-light:#dceaf1;
    --border:#e7ddc8;
    --shadow-sm:0 1px 2px rgba(31,41,55,0.06), 0 1px 1px rgba(31,41,55,0.04);
    --shadow-md:0 4px 14px rgba(31,41,55,0.08), 0 2px 4px rgba(31,41,55,0.05);
    --shadow-lg:0 12px 28px rgba(31,41,55,0.14), 0 4px 10px rgba(31,41,55,0.06);
    --radius-sm:8px;
    --radius-md:14px;
    --radius-lg:20px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 12% 0%, rgba(15,76,58,0.06), transparent 45%),
      radial-gradient(circle at 88% 8%, rgba(201,151,63,0.10), transparent 40%),
      var(--bg-1);
    color:var(--ink);
    font-family:'Inter', system-ui, sans-serif;
    min-height:100vh;
  }
  .wrap{ max-width:960px; margin:0 auto; padding:44px 24px 70px; }

  header{
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    margin-bottom:32px;
    flex-wrap:wrap;
    gap:12px;
    padding-bottom:22px;
    position:relative;
  }
  header::after{
    content:"";
    position:absolute;
    left:0; right:0; bottom:0;
    height:3px;
    border-radius:3px;
    background:linear-gradient(90deg, var(--emerald) 0%, var(--gold) 55%, var(--terracotta) 100%);
  }
  h1{
    font-family:'Fraunces', Georgia, serif;
    font-size:2.1rem;
    font-weight:700;
    letter-spacing:-0.01em;
    margin:0 0 4px;
    color:var(--emerald);
    line-height:1.1;
  }
  .subtitle{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--gold);
    font-weight:500;
  }
  .count{
    font-family:'JetBrains Mono', monospace;
    font-size:0.82rem;
    color:var(--ink-soft);
    background:var(--surface);
    padding:6px 14px;
    border-radius:999px;
    box-shadow:var(--shadow-sm);
    border:1px solid var(--border);
  }

  /* form card */
  .card-form{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-lg);
    padding:26px 28px;
    margin-bottom:28px;
    position:relative;
    box-shadow:var(--shadow-md);
    overflow:hidden;
  }
  .card-form::before{
    content:"";
    position:absolute; left:0; top:0; bottom:0; width:5px;
    background:linear-gradient(180deg, var(--emerald), var(--emerald-light));
  }
  .form-grid{
    display:grid;
    grid-template-columns:2fr 1.3fr 1fr;
    gap:14px 16px;
  }
  .form-grid .full{ grid-column:1/-1; }
  label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:6px;
    font-weight:500;
  }
  input, select{
    width:100%;
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
    padding:10px 12px;
    border:1.5px solid var(--border);
    border-radius:var(--radius-sm);
    background:var(--bg-1);
    color:var(--ink);
    transition:border-color 0.15s ease, box-shadow 0.15s ease;
  }
  input:focus, select:focus{
    outline:none;
    border-color:var(--emerald-light);
    box-shadow:0 0 0 3px var(--emerald-glow);
  }
  .form-actions{
    margin-top:20px;
    display:flex;
    justify-content:flex-end;
  }
  button{
    font-family:'Inter', sans-serif;
    font-weight:600;
    letter-spacing:0.01em;
    font-size:0.86rem;
    background:var(--emerald);
    color:#fff;
    border:none;
    padding:11px 22px;
    border-radius:var(--radius-sm);
    cursor:pointer;
    transition:background 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    box-shadow:var(--shadow-sm);
  }
  button:hover{ background:var(--emerald-light); transform:translateY(-1px); box-shadow:var(--shadow-md); }
  button:active{ transform:translateY(0); }
  button:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .file-bar{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:24px;
  }
  .file-label{
    display:inline-block;
  }
  .file-hint{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    color:var(--ink-soft);
  }

  /* filters */
  .filters{
    display:flex;
    gap:8px;
    margin-bottom:20px;
    flex-wrap:wrap;
    align-items:center;
  }
  .filters input[type=search]{
    flex:1;
    min-width:180px;
    background:var(--surface);
    box-shadow:var(--shadow-sm);
  }
  .chip{
    font-family:'Inter', sans-serif;
    font-size:0.78rem;
    font-weight:600;
    letter-spacing:0.01em;
    padding:9px 16px;
    border:1.5px solid var(--border);
    border-radius:999px;
    background:var(--surface);
    color:var(--emerald);
    cursor:pointer;
    box-shadow:var(--shadow-sm);
    transition:all 0.15s ease;
  }
  .chip:hover{ border-color:var(--emerald-light); transform:translateY(-1px); }
  .chip.active{
    background:var(--emerald);
    border-color:var(--emerald);
    color:#fff;
  }

  /* book grid */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:18px;
  }
  .book{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    padding:18px 18px 16px;
    position:relative;
    box-shadow:var(--shadow-sm);
    display:flex;
    flex-direction:column;
    gap:7px;
    transition:transform 0.15s ease, box-shadow 0.15s ease;
  }
  .book:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow-lg);
  }
  .book::before{
    content:"";
    position:absolute; top:0; left:0; bottom:0; width:4px;
    border-radius:var(--radius-md) 0 0 var(--radius-md);
    background:linear-gradient(180deg, var(--gold), var(--terracotta));
  }
  .book-title{
    font-family:'Fraunces', Georgia, serif;
    font-size:1.12rem;
    font-weight:700;
    color:var(--emerald);
    line-height:1.28;
  }
  .book-author{
    font-style:italic;
    font-size:0.88rem;
    color:var(--ink-soft);
  }
  .book-meta{
    display:inline-block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--gold);
    background:#fbf1de;
    padding:2px 8px;
    border-radius:6px;
    margin-top:2px;
    width:fit-content;
  }
  .status-badge{
    align-self:flex-start;
    font-family:'Inter', sans-serif;
    font-size:0.7rem;
    font-weight:600;
    letter-spacing:0.02em;
    padding:4px 11px;
    border-radius:999px;
    margin-top:4px;
  }
  .status-dibaca{ background:var(--gold-light); color:#6b5223; }
  .status-selesai{ background:var(--emerald-glow); color:var(--emerald); }
  .status-rencana{ background:var(--sky-light); color:var(--sky); }

  .book-location{
    font-family:'JetBrains Mono', monospace;
    font-size:0.74rem;
    color:var(--ink-soft);
    margin-top:2px;
  }
  .book-actions{
    margin-top:auto;
    display:flex;
    justify-content:flex-end;
    gap:14px;
    padding-top:10px;
    border-top:1px solid var(--bg-2);
  }
  .link-btn{
    background:none;
    border:none;
    color:var(--ink-soft);
    font-family:'Inter', sans-serif;
    font-size:0.74rem;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    padding:2px 0;
    transition:color 0.15s ease;
  }
  .link-btn:hover{ color:var(--terracotta); }

  .editing-card{
    gap:9px;
  }
  .editing-card label{
    font-family:'JetBrains Mono', monospace;
    font-size:0.65rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:var(--ink-soft);
    margin-bottom:-4px;
  }
  .editing-card input{
    width:100%;
    font-size:0.9rem;
    padding:7px 9px;
  }
  tr.editing-row td{
    background:var(--emerald-glow);
  }
  tr.editing-row input{
    width:100%;
    font-size:0.88rem;
    padding:6px 8px;
  }

  .empty{
    text-align:center;
    padding:60px 20px;
    color:var(--ink-soft);
    background:var(--surface);
    border:1px dashed var(--border);
    border-radius:var(--radius-lg);
    font-size:0.95rem;
  }
  .loading{
    text-align:center;
    padding:40px;
    color:var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
    font-size:0.85rem;
  }

  /* list/table view */
  .view-toggle{
    display:flex;
    gap:6px;
  }
  table.book-table{
    width:100%;
    border-collapse:separate;
    border-spacing:0;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:var(--radius-md);
    overflow:hidden;
    box-shadow:var(--shadow-sm);
  }
  table.book-table th{
    text-align:left;
    font-family:'JetBrains Mono', monospace;
    font-size:0.68rem;
    letter-spacing:0.06em;
    text-transform:uppercase;
    color:#fff;
    background:var(--emerald);
    padding:12px 14px;
  }
  table.book-table td{
    padding:12px 14px;
    border-bottom:1px solid var(--bg-2);
    font-size:0.9rem;
    vertical-align:middle;
  }
  table.book-table tr:last-child td{ border-bottom:none; }
  table.book-table tr:hover td{ background:var(--bg-1); }
  table.book-table .col-title{ font-family:'Fraunces', Georgia, serif; font-weight:700; color:var(--emerald); }
  table.book-table .col-author{ font-style:italic; color:var(--ink-soft); }
  table.book-table .row-actions{
    display:flex;
    gap:12px;
    justify-content:flex-end;
    white-space:nowrap;
  }

  /* ===== Responsif untuk mobile ===== */
  @media (max-width: 640px){
    .wrap{ padding:24px 14px 44px; }
    h1{ font-size:1.5rem; }
    .subtitle{ font-size:0.66rem; }
    .count{ font-size:0.72rem; padding:5px 12px; }

    header{ gap:6px; }

    .file-bar{ gap:8px; }
    .file-bar .chip{ flex:1 1 auto; text-align:center; font-size:0.68rem; padding:9px 10px; }
    .file-hint{ width:100%; order:99; }

    .card-form{ padding:18px 16px; }
    .form-grid{
      grid-template-columns:1fr;
      gap:12px;
    }
    .form-grid .full{ grid-column:auto; }
    .form-actions{ justify-content:stretch; }
    .form-actions button{ width:100%; }

    .filters{ gap:6px; }
    .filters input[type=search]{ flex-basis:100%; order:-1; }
    .chip{ font-size:0.7rem; padding:7px 12px; }
    .view-toggle{ width:100%; justify-content:flex-start; }

    .grid{
      grid-template-columns:1fr;
      gap:14px;
    }
    .book{ padding:16px; }
    .book:hover{ transform:none; }

    /* Tabel jadi bisa digeser horizontal di layar sempit */
    table.book-table{
      display:block;
      overflow-x:auto;
      white-space:nowrap;
      border-radius:var(--radius-sm);
    }
    table.book-table th, table.book-table td{
      font-size:0.8rem;
      padding:9px 10px;
    }

    .book-actions, .row-actions{
      flex-wrap:wrap;
      justify-content:flex-start;
    }
  }

  @media (max-width: 400px){
    h1{ font-size:1.3rem; }
    .file-bar .chip{ font-size:0.62rem; padding:8px 9px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Katalog Koleksi Buku</h1>
      <div class="subtitle">Perpustakaan Pribadi</div>
    </div>
    <div class="count" id="countLabel">memuat…</div>
  </header>

  <div class="file-bar">
    <button class="chip" id="githubBtn">🐙 Hubungkan ke GitHub</button>
    <button class="chip" id="linkFileBtn">🔗 Hubungkan File Otomatis</button>
    <button class="chip" id="exportBtn">⬇ Simpan Koleksi ke File</button>
    <label class="chip file-label" for="importFile">⬆ Muat Koleksi dari File</label>
    <input type="file" id="importFile" accept=".json" hidden>
    <button class="chip" id="exportXlsxBtn">📊 Unduh sebagai Excel</button>
    <span class="file-hint" id="fileHint">Tersimpan otomatis di browser ini. Gunakan tombol simpan/muat untuk cadangan atau pindah perangkat.</span>
  </div>

  <div class="card-form" id="githubPanel" style="display:none;">
    <div class="form-grid">
      <div>
        <label for="ghToken">Personal Access Token</label>
        <input id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx">
      </div>
      <div>
        <label for="ghRepo">Repository (owner/nama-repo)</label>
        <input id="ghRepo" type="text" placeholder="mis. budi/koleksi-buku">
      </div>
      <div>
        <label for="ghBranch">Branch</label>
        <input id="ghBranch" type="text" placeholder="main" value="main">
      </div>
      <div class="full">
        <label for="ghPath">Nama File di Repo</label>
        <input id="ghPath" type="text" placeholder="koleksi-buku.json" value="koleksi-buku.json">
      </div>
    </div>
    <div class="form-actions" style="justify-content:space-between; align-items:center;">
      <span class="file-hint" id="ghStatus"></span>
      <div style="display:flex; gap:8px;">
        <button class="link-btn" id="ghDisconnectBtn" style="text-transform:uppercase; font-family:'Courier New',monospace;">Putuskan</button>
        <button id="ghConnectBtn">Hubungkan &amp; Muat</button>
      </div>
    </div>
  </div>


  <div class="card-form">
    <div class="form-grid">
      <div class="full">
        <label for="fTitle">Judul Buku</label>
        <input id="fTitle" type="text" placeholder="mis. Laskar Pelangi">
      </div>
      <div>
        <label for="fAuthor">Penulis</label>
        <input id="fAuthor" type="text" placeholder="mis. Andrea Hirata">
      </div>
      <div>
        <label for="fGenre">Genre</label>
        <input id="fGenre" type="text" placeholder="mis. Fiksi">
      </div>
      <div>
        <label for="fStatus">Status</label>
        <select id="fStatus">
          <option value="rencana">Rencana Baca</option>
          <option value="dibaca">Sedang Dibaca</option>
          <option value="selesai">Selesai</option>
        </select>
      </div>
      <div>
        <label for="fLokasi">Lokasi Penyimpanan</label>
        <input id="fLokasi" type="text" placeholder="mis. Rak A, Lemari 2">
      </div>
    </div>
    <div class="form-actions">
      <button id="addBtn">+ Tambah Buku</button>
    </div>
  </div>

  <div class="filters">
    <input type="search" id="searchBox" placeholder="Cari judul, penulis, atau lokasi…">
    <button class="chip active" data-filter="semua">Semua</button>
    <button class="chip" data-filter="rencana">Rencana</button>
    <button class="chip" data-filter="dibaca">Dibaca</button>
    <button class="chip" data-filter="selesai">Selesai</button>
    <span style="flex:1"></span>
    <div class="view-toggle">
      <button class="chip active" id="viewCardBtn">🗂 Kartu</button>
      <button class="chip" id="viewListBtn">📋 Daftar</button>
    </div>
  </div>

  <div id="grid" class="loading">Memuat koleksi…</div>
</div>

<script>
let books = [];
let currentFilter = 'semua';
let currentView = 'kartu';
let loaded = false;

const grid = document.getElementById('grid');
const countLabel = document.getElementById('countLabel');

document.getElementById('viewCardBtn').addEventListener('click', ()=>{
  currentView = 'kartu';
  document.getElementById('viewCardBtn').classList.add('active');
  document.getElementById('viewListBtn').classList.remove('active');
  render();
});
document.getElementById('viewListBtn').addEventListener('click', ()=>{
  currentView = 'daftar';
  document.getElementById('viewListBtn').classList.add('active');
  document.getElementById('viewCardBtn').classList.remove('active');
  render();
});



const STORAGE_KEY = 'koleksi-buku-mandiri-v1';
let autoSaveActive = true;
let linkedFileHandle = null;

const fileHint = document.getElementById('fileHint');
const linkFileBtn = document.getElementById('linkFileBtn');
const fsApiSupported = 'showSaveFilePicker' in window;

if(!fsApiSupported){
  linkFileBtn.disabled = true;
  linkFileBtn.title = 'Fitur ini hanya didukung di Chrome, Edge, atau Brave.';
  linkFileBtn.style.opacity = '0.5';
  linkFileBtn.style.cursor = 'not-allowed';
}

linkFileBtn.addEventListener('click', async ()=>{
  if(!fsApiSupported){
    alert('Fitur "Hubungkan File Otomatis" hanya didukung di browser berbasis Chromium (Chrome, Edge, Brave). Gunakan tombol simpan/muat manual sebagai gantinya.');
    return;
  }
  try{
    linkedFileHandle = await window.showSaveFilePicker({
      suggestedName: 'koleksi-buku.json',
      types: [{ description: 'File JSON', accept: {'application/json': ['.json']} }]
    });
    // Jika file yang dipilih sudah punya isi, muat datanya
    try{
      const existingFile = await linkedFileHandle.getFile();
      const text = await existingFile.text();
      if(text.trim()){
        const data = JSON.parse(text);
        if(Array.isArray(data)) books = data;
      }
    }catch(e){ /* file kosong/baru, biarkan koleksi saat ini */ }

    await writeToLinkedFile();
    linkFileBtn.textContent = `✅ Tersambung: ${linkedFileHandle.name}`;
    fileHint.textContent = 'Setiap perubahan otomatis ditulis ke file yang terhubung.';
    render();
  }catch(e){
    // Pengguna membatalkan dialog pemilihan file — tidak perlu ditindaklanjuti
  }
});

async function writeToLinkedFile(){
  if(!linkedFileHandle) return;
  try{
    const writable = await linkedFileHandle.createWritable();
    await writable.write(JSON.stringify(books, null, 2));
    await writable.close();
  }catch(e){
    fileHint.textContent = 'Gagal menulis ke file yang terhubung. Coba hubungkan ulang.';
  }
}

function loadBooks(){
  try{
    const saved = localStorage.getItem(STORAGE_KEY);
    books = saved ? JSON.parse(saved) : [];
  }catch(e){
    // localStorage tidak tersedia (mis. saat pratinjau di dalam Claude.ai)
    books = [];
    autoSaveActive = false;
    showAutoSaveWarning();
  }
  loaded = true;
  render();
}

function saveBooks(){
  if(autoSaveActive){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }catch(e){
      autoSaveActive = false;
      showAutoSaveWarning();
    }
  }
  writeToLinkedFile();
  ghSaveIfConnected();
}

function showAutoSaveWarning(){
  fileHint.textContent = 'Auto-save browser tidak tersedia di lingkungan ini — gunakan tombol simpan/muat file secara manual.';
}

/* ===== Integrasi GitHub (Contents API) ===== */
const GH_CONFIG_KEY = 'koleksi-buku-github-config';
let ghConfig = null; // { token, repo, branch, path }
let ghSha = null;    // sha file saat ini di GitHub, dipakai untuk update
let ghBusy = false;
let ghQueued = false;

const githubBtn = document.getElementById('githubBtn');
const githubPanel = document.getElementById('githubPanel');
const ghStatus = document.getElementById('ghStatus');

function utf8ToBase64(str){
  return btoa(unescape(encodeURIComponent(str)));
}
function base64ToUtf8(b64){
  return decodeURIComponent(escape(atob(b64)));
}

githubBtn.addEventListener('click', ()=>{
  githubPanel.style.display = githubPanel.style.display === 'none' ? 'block' : 'none';
});

document.getElementById('ghDisconnectBtn').addEventListener('click', ()=>{
  ghConfig = null;
  ghSha = null;
  try{ localStorage.removeItem(GH_CONFIG_KEY); }catch(e){}
  githubBtn.textContent = '🐙 Hubungkan ke GitHub';
  ghStatus.textContent = 'Terputus dari GitHub.';
  document.getElementById('ghToken').value = '';
});

document.getElementById('ghConnectBtn').addEventListener('click', async ()=>{
  const token = document.getElementById('ghToken').value.trim();
  const repo = document.getElementById('ghRepo').value.trim();
  const branch = document.getElementById('ghBranch').value.trim() || 'main';
  const path = document.getElementById('ghPath').value.trim() || 'koleksi-buku.json';

  if(!token || !repo){
    ghStatus.textContent = 'Isi token dan repository terlebih dahulu.';
    return;
  }

  ghConfig = { token, repo, branch, path };
  ghStatus.textContent = 'Menghubungkan…';

  const result = await ghLoadFromRepo();
  if(result.ok){
    try{ localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(ghConfig)); }catch(e){}
    githubBtn.textContent = `✅ GitHub: ${repo}`;
    ghStatus.textContent = result.message;
    render();
  }else{
    ghStatus.textContent = result.message;
    ghConfig = null;
  }
});

async function ghLoadFromRepo(){
  const { token, repo, branch, path } = ghConfig;
  const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(path)}?ref=${encodeURIComponent(branch)}`;
  try{
    const res = await fetch(url, {
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json'
      }
    });
    if(res.status === 404){
      // File belum ada — akan dibuat saat pertama kali menyimpan
      ghSha = null;
      return { ok:true, message: 'Terhubung. File belum ada, akan dibuat saat pertama menyimpan.' };
    }
    if(!res.ok){
      const errBody = await res.json().catch(()=>({}));
      return { ok:false, message: `Gagal terhubung (${res.status}): ${errBody.message || 'Periksa token/repo/branch.'}` };
    }
    const data = await res.json();
    ghSha = data.sha;
    const content = base64ToUtf8(data.content.replace(/\n/g,''));
    const parsed = JSON.parse(content);
    if(Array.isArray(parsed)) books = parsed;
    return { ok:true, message: `Terhubung. Koleksi dimuat dari ${repo}.` };
  }catch(e){
    return { ok:false, message: 'Gagal terhubung. Periksa koneksi internet atau token.' };
  }
}

async function ghSaveIfConnected(){
  if(!ghConfig) return;
  if(ghBusy){ ghQueued = true; return; }
  ghBusy = true;
  const { token, repo, branch, path } = ghConfig;
  const url = `https://api.github.com/repos/${repo}/contents/${encodeURIComponent(path)}`;
  const body = {
    message: 'Update koleksi buku',
    content: utf8ToBase64(JSON.stringify(books, null, 2)),
    branch
  };
  if(ghSha) body.sha = ghSha;

  try{
    ghStatus.textContent = 'Menyimpan ke GitHub…';
    const res = await fetch(url, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });
    const data = await res.json().catch(()=>({}));
    if(res.ok){
      ghSha = data.content ? data.content.sha : ghSha;
      ghStatus.textContent = `Tersimpan ke GitHub (${new Date().toLocaleTimeString('id-ID')}).`;
    }else{
      ghStatus.textContent = `Gagal menyimpan (${res.status}): ${data.message || 'coba lagi.'}`;
    }
  }catch(e){
    ghStatus.textContent = 'Gagal menyimpan ke GitHub. Periksa koneksi internet.';
  }
  ghBusy = false;
  if(ghQueued){
    ghQueued = false;
    ghSaveIfConnected();
  }
}

async function ghAutoReconnect(){
  try{
    const saved = localStorage.getItem(GH_CONFIG_KEY);
    if(!saved) return;
    ghConfig = JSON.parse(saved);
    document.getElementById('ghToken').value = ghConfig.token;
    document.getElementById('ghRepo').value = ghConfig.repo;
    document.getElementById('ghBranch').value = ghConfig.branch;
    document.getElementById('ghPath').value = ghConfig.path;
    ghStatus.textContent = 'Menyambungkan ulang ke GitHub…';
    const result = await ghLoadFromRepo();
    githubBtn.textContent = result.ok ? `✅ GitHub: ${ghConfig.repo}` : '🐙 Hubungkan ke GitHub';
    ghStatus.textContent = result.message;
    render();
  }catch(e){ /* abaikan, biarkan pengguna hubungkan manual */ }
}

document.getElementById('exportXlsxBtn').addEventListener('click', ()=>{
  if(books.length === 0){
    alert('Belum ada buku untuk diekspor. Tambahkan buku terlebih dahulu.');
    return;
  }

  const rows = books.map(b => ({
    'Judul': b.title || '',
    'Penulis': b.author || '',
    'Genre': b.genre || '',
    'Status': statusLabel(b.status),
    'Lokasi Penyimpanan': b.lokasi || ''
  }));

  const worksheet = XLSX.utils.json_to_sheet(rows);
  worksheet['!cols'] = [
    { wch: 28 }, // Judul
    { wch: 22 }, // Penulis
    { wch: 16 }, // Genre
    { wch: 14 }, // Status
    { wch: 20 }  // Lokasi
  ];

  const workbook = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(workbook, worksheet, 'Koleksi Buku');

  const tanggal = new Date().toISOString().slice(0,10);
  XLSX.writeFile(workbook, `koleksi-buku-${tanggal}.xlsx`);
});

document.getElementById('exportBtn').addEventListener('click', ()=>{
  const dataStr = JSON.stringify(books, null, 2);
  const blob = new Blob([dataStr], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const tanggal = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `koleksi-buku-${tanggal}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

document.getElementById('importFile').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev)=>{
    try{
      const data = JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('Format tidak sesuai');
      books = data;
      render();
    }catch(err){
      alert('Gagal membaca file. Pastikan ini adalah file JSON yang diekspor dari katalog ini.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('addBtn').addEventListener('click', async ()=>{
  const title = document.getElementById('fTitle').value.trim();
  const author = document.getElementById('fAuthor').value.trim();
  const genre = document.getElementById('fGenre').value.trim();
  const status = document.getElementById('fStatus').value;
  const lokasi = document.getElementById('fLokasi').value.trim();

  if(!title){
    document.getElementById('fTitle').focus();
    return;
  }

  books.unshift({
    id: Date.now().toString(36),
    title, author, genre, status, lokasi
  });

  document.getElementById('fTitle').value = '';
  document.getElementById('fAuthor').value = '';
  document.getElementById('fGenre').value = '';
  document.getElementById('fLokasi').value = '';
  document.getElementById('fStatus').value = 'rencana';

  render();
  await saveBooks();
});

document.querySelectorAll('.chip').forEach(chip=>{
  chip.addEventListener('click', ()=>{
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

document.getElementById('searchBox').addEventListener('input', render);

async function removeBook(id){
  books = books.filter(b=>b.id!==id);
  render();
  await saveBooks();
}

async function cycleStatus(id){
  const order = ['rencana','dibaca','selesai'];
  const b = books.find(x=>x.id===id);
  if(!b) return;
  const idx = order.indexOf(b.status);
  b.status = order[(idx+1)%order.length];
  render();
  await saveBooks();
}

let editingId = null;

function editBook(id){
  editingId = id;
  render();
}

function cancelEdit(){
  editingId = null;
  render();
}

async function saveEdit(id){
  const b = books.find(x=>x.id===id);
  if(!b) return;
  const newTitle = document.getElementById(`edit-title-${id}`).value.trim();
  if(!newTitle){
    alert('Judul tidak boleh kosong.');
    return;
  }
  b.title = newTitle;
  b.author = document.getElementById(`edit-author-${id}`).value.trim();
  b.genre = document.getElementById(`edit-genre-${id}`).value.trim();
  b.lokasi = document.getElementById(`edit-lokasi-${id}`).value.trim();
  editingId = null;
  render();
  await saveBooks();
}

function statusLabel(s){
  return {rencana:'Rencana Baca', dibaca:'Sedang Dibaca', selesai:'Selesai'}[s] || s;
}

function render(){
  if(!loaded){
    grid.className = 'loading';
    grid.textContent = 'Memuat koleksi…';
    return;
  }

  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  let list = books.filter(b=>{
    const matchFilter = currentFilter === 'semua' || b.status === currentFilter;
    const matchSearch = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q) || (b.lokasi||'').toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });

  countLabel.textContent = `${books.length} buku dalam koleksi`;

  if(list.length === 0){
    grid.className = 'empty';
    grid.textContent = books.length === 0
      ? 'Rak masih kosong. Tambahkan buku pertamamu di atas.'
      : 'Tidak ada buku yang cocok dengan pencarian atau filter ini.';
    return;
  }

  if(currentView === 'daftar'){
    grid.className = '';
    grid.innerHTML = `
      <table class="book-table">
        <thead>
          <tr>
            <th>Judul</th>
            <th>Penulis</th>
            <th>Genre</th>
            <th>Status</th>
            <th>Lokasi</th>
            <th></th>
          </tr>
        </thead>
        <tbody>
          ${list.map(b=> b.id === editingId ? `
            <tr class="editing-row">
              <td><input type="text" id="edit-title-${b.id}" value="${escapeAttr(b.title)}"></td>
              <td><input type="text" id="edit-author-${b.id}" value="${escapeAttr(b.author||'')}"></td>
              <td><input type="text" id="edit-genre-${b.id}" value="${escapeAttr(b.genre||'')}"></td>
              <td><span class="status-badge status-${b.status}">${statusLabel(b.status)}</span></td>
              <td><input type="text" id="edit-lokasi-${b.id}" value="${escapeAttr(b.lokasi||'')}"></td>
              <td>
                <div class="row-actions">
                  <button class="link-btn" onclick="saveEdit('${b.id}')">Simpan</button>
                  <button class="link-btn" onclick="cancelEdit()">Batal</button>
                </div>
              </td>
            </tr>
          ` : `
            <tr>
              <td class="col-title">${escapeHtml(b.title)}</td>
              <td class="col-author">${escapeHtml(b.author||'—')}</td>
              <td>${escapeHtml(b.genre||'—')}</td>
              <td><span class="status-badge status-${b.status}">${statusLabel(b.status)}</span></td>
              <td>${b.lokasi ? '📍 '+escapeHtml(b.lokasi) : '—'}</td>
              <td>
                <div class="row-actions">
                  <button class="link-btn" onclick="editBook('${b.id}')">Edit</button>
                  <button class="link-btn" onclick="cycleStatus('${b.id}')">Ubah Status</button>
                  <button class="link-btn" onclick="removeBook('${b.id}')">Hapus</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
    return;
  }

  grid.className = 'grid';
  grid.innerHTML = list.map(b=> b.id === editingId ? `
    <div class="book editing-card">
      <label>Judul</label>
      <input type="text" id="edit-title-${b.id}" value="${escapeAttr(b.title)}">
      <label>Penulis</label>
      <input type="text" id="edit-author-${b.id}" value="${escapeAttr(b.author||'')}">
      <label>Genre</label>
      <input type="text" id="edit-genre-${b.id}" value="${escapeAttr(b.genre||'')}">
      <label>Lokasi Penyimpanan</label>
      <input type="text" id="edit-lokasi-${b.id}" value="${escapeAttr(b.lokasi||'')}">
      <div class="book-actions">
        <button class="link-btn" onclick="saveEdit('${b.id}')">Simpan</button>
        <button class="link-btn" onclick="cancelEdit()">Batal</button>
      </div>
    </div>
  ` : `
    <div class="book">
      <div class="book-title">${escapeHtml(b.title)}</div>
      ${b.author ? `<div class="book-author">${escapeHtml(b.author)}</div>` : ''}
      ${b.genre ? `<div class="book-meta">${escapeHtml(b.genre)}</div>` : ''}
      <span class="status-badge status-${b.status}">${statusLabel(b.status)}</span>
      ${b.lokasi ? `<div class="book-location">📍 ${escapeHtml(b.lokasi)}</div>` : ''}
      <div class="book-actions">
        <button class="link-btn" onclick="editBook('${b.id}')">Edit</button>
        <button class="link-btn" onclick="cycleStatus('${b.id}')">Ubah Status</button>
        <button class="link-btn" onclick="removeBook('${b.id}')">Hapus</button>
      </div>
    </div>
  `).join('');
}

function escapeAttr(str){
  return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

loadBooks();
ghAutoReconnect();
</script>
